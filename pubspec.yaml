name: pemilihan_ketua_kelas_informatika
description: Aplikasi voting untuk Mahasiswa Informatika kelas 4a (INFORMATIKA 4A).
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.0.0
  
  # Routing
  go_router: ^13.0.0
  
  # API & HTTP
  http: ^1.1.0
  
  # Local Storage
  shared_preferences: ^2.2.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # UI
  flutter_svg: ^2.0.0
  cached_network_image: ^3.3.0
  
  # Charts
  fl_chart: ^0.65.0
  
  # Date & Time
  intl: ^0.19.0
  
  # Animations
  animations: ^2.0.0
  
  # File handling
  path_provider: ^2.1.0
  share_plus: ^7.2.0
  
  # Cupertino Icons
  cupertino_icons: ^1.0.2
  
  # PDF & Excel Export
  pdf: ^3.12.0
  excel: ^4.0.6
  
  # Image Picker (Untuk memilih foto dari galeri/kamera)
  image_picker: ^1.0.5  # UPDATE ke versi terbaru
  
  # Image Processing
  image: ^4.1.3  # Untuk manipulasi gambar (resize, crop, dll)
  
  # Image Compression
  flutter_image_compress: ^2.1.0  # Untuk kompres gambar
  
  # Base64 encoding/decoding (sudah termasuk di dart:convert)
  # Tidak perlu tambahan dependency

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  
  # Testing
  mockito: ^5.4.0
  mocktail: ^1.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/placeholders/
